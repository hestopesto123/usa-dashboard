<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Project USA — Overall Complete</title>
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background: #f9f9f7;
    display: flex; align-items: center; justify-content: center;
  }
  @media (prefers-color-scheme: dark) { body { background: #0d0d0d; } }

  .widget-root {
    --surface-1:      #fcfcfb;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6;
  }
  @media (prefers-color-scheme: dark) {
    .widget-root {
      --surface-1:      #1a1a19;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --series-1:       #3987e5;
    }
  }

  .widget-root {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--surface-1);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: clamp(16px, 4vw, 28px) clamp(20px, 5vw, 32px);
    display: flex;
    align-items: center;
    gap: clamp(14px, 3vw, 22px);
    box-sizing: border-box;
    max-width: 420px;
    width: calc(100% - 24px);
  }
  .widget-root * { box-sizing: border-box; }

  .ring-svg { flex: none; width: clamp(64px, 22vw, 96px); height: clamp(64px, 22vw, 96px); }

  .info { min-width: 0; }
  .eyebrow {
    font-size: 11.5px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
    color: var(--text-muted); margin: 0 0 6px;
  }
  .value { font-size: clamp(24px, 6vw, 34px); font-weight: 700; line-height: 1.05; }
  .sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
</style>
</head>
<body>
  <div class="widget-root">
    <svg class="ring-svg" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="42" fill="none" stroke="var(--gridline)" stroke-width="12"/>
      <circle cx="50" cy="50" r="42" fill="none" stroke="var(--series-1)" stroke-width="12"
        stroke-dasharray="263.9" stroke-dashoffset="216.4" stroke-linecap="round" transform="rotate(-90 50 50)"/>
    </svg>
    <div class="info">
      <p class="eyebrow">Project USA · Overall Complete</p>
      <div class="value">18%</div>
      <div class="sub">9 of 50 tasks done</div>
    </div>
  </div>
</body>
</html>
